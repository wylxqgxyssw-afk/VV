<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>黑色极简 · 剧本智能助手（多端同步）</title>
  <link rel="manifest" href="manifest-chat.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#000000">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: '#000000', darker: '#121212', accent: '#165DFF',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    :root {
      --font-size: 16px;
      --line-height: 1.6;
      --user-text-color: #FFFFFF;
      --ai-text-color: #FFFFFF;
      --bubble-px: 16px;
      --bubble-py: 8px;
      --chat-h-padding: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
    }

    body {
      height: 100vh;
      height: 100dvh;
      position: fixed;
      top: 0;
      left: 0;
    }

    .layout-container {
      width: 100%;
      height: 100%;
      position: relative;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    .chat-main-panel {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    #chat-box {
      flex: 1 1 auto;
      overflow-y: auto;
      min-height: 0;
      padding-left: var(--chat-h-padding);
      padding-right: var(--chat-h-padding);
      padding-bottom: 16px;
    }

    .left-set-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 85%;
      max-width: 400px;
      height: 100%;
      height: 100dvh;
      z-index: 100;
      background: #121212;
      border-right: 1px solid #333;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      overflow-y: auto;
      padding: 24px 16px;
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
    }

    .left-set-panel.expand {
      transform: translateX(0);
    }

    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 99;
      display: none;
    }

    .drawer-overlay.show {
      display: block;
    }

    .mobile-input-bar {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 200;
      background: #000;
      border-top: 1px solid #333;
      padding: 12px;
      padding-bottom: calc(12px + var(--safe-bottom));
      gap: 8px;
    }

    #chat-box {
      padding-bottom: calc(72px + var(--safe-bottom)) !important;
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .avatar-img, .avatar-placeholder {
      object-fit: cover;
      width: 100%;
      height: 100%;
      border-radius: 4px;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      flex-shrink: 0;
      overflow: hidden;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #888;
    }

    .message-row {
      min-width: 0;
      width: 100%;
    }

    .chat-bubble-content {
      word-wrap: break-word;
      word-break: break-word;
      white-space: pre-wrap;
      max-width: 100%;
      overflow-wrap: break-word;
      font-size: var(--font-size);
      line-height: var(--line-height);
      padding: var(--bubble-py) var(--bubble-px);
    }

    .user-bubble {
      background-color: #000 !important;
      color: var(--user-text-color);
      border: 1px solid #333;
    }

    .ai-bubble {
      background-color: #000 !important;
      color: var(--ai-text-color);
      border: 1px solid #333;
    }

    .katex {
      font-size: var(--font-size);
      line-height: var(--line-height);
      max-width: 100%;
      overflow-x: auto;
      display: inline-block;
      vertical-align: bottom;
    }

    .collapsible-settings { display: none; }

    .name-tag {
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 1px dashed transparent;
    }

    .name-tag:hover {
      border-bottom-color: #888;
      color: #ccc;
    }

    .name-tag .fa-pencil {
      opacity: 0;
      transition: opacity 0.2s;
      font-size: 0.7em;
      margin-left: 4px;
    }

    .name-tag:hover .fa-pencil { opacity: 0.7; }

    .msg-name-label {
      font-size: 0.7em;
      opacity: 0.7;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
      display: block;
      cursor: pointer;
    }

    .name-edit-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 300;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      display: none;
    }

    .name-edit-dialog {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 380px;
    }

    .chat-header, .chat-footer {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="layout-container">
  <!-- 左侧抽屉设置面板 -->
  <div class="left-set-panel" id="left-panel">
    <button class="self-end text-gray-400 hover:text-white mb-4" id="close-drawer-btn">
      <i class="fa fa-times fa-lg"></i>
    </button>
    <h1 class="text-xl font-bold mb-4">剧本/人设设置</h1>
    <textarea class="w-full h-40 bg-dark border border-gray-800 rounded p-3 text-white outline-none resize-none mb-4" placeholder="输入剧本内容，AI会根据剧本回答问题&#10;支持格式：&#10;[red:文字] 红色&#10;[b:文字] 加粗&#10;[br] 换行" id="agent-prompt"></textarea>

    <button class="w-full bg-gray-800 rounded p-2 mb-3 text-sm" id="toggle-settings">
      <i class="fa fa-cog mr-1"></i> 展开头像/样式设置
    </button>
    <div class="collapsible-settings bg-dark border border-gray-800 rounded p-3 mb-3 space-y-3" id="collapsible-settings">
      <div><h3 class="text-sm text-gray-400 mb-1">智能体名称</h3><input class="w-full bg-darker rounded p-2 text-white outline-none" id="agent-name-set"></div>
      <div><h3 class="text-sm text-gray-400 mb-1">智能体头像</h3><button class="w-full bg-accent/20 rounded p-2 text-sm mb-2" id="agent-avatar-upload">上传头像</button><input type="file" id="agent-avatar-file" class="hidden" accept="image/*"><div id="agent-avatar-preview" class="w-14 h-14 bg-accent/20 flex items-center justify-center overflow-hidden rounded-lg mx-auto"><span>预览</span></div></div>
      <div class="border-t border-gray-700 pt-3"><h3 class="text-sm text-gray-400 mb-1">你的名称</h3><input class="w-full bg-darker rounded p-2 text-white outline-none" id="user-name"></div>
      <div><h3 class="text-sm text-gray-400 mb-1">你的头像</h3><button class="w-full bg-accent/20 rounded p-2 text-sm mb-2" id="user-avatar-upload">上传头像</button><input type="file" id="user-avatar-file" class="hidden" accept="image/*"><div id="user-avatar-preview" class="w-14 h-14 bg-accent/20 flex items-center justify-center overflow-hidden rounded-lg mx-auto"><span>预览</span></div></div>
      <div class="border-t border-gray-700 pt-3"><h3 class="text-sm text-gray-400 mb-1">API Key（已通过代理调用）</h3><input type="password" class="w-full bg-darker rounded p-2 text-white outline-none" id="api-key" placeholder="无需填写" disabled><p class="text-xs text-gray-500 mt-1">已通过 Supabase Edge Function 安全调用 DeepSeek API</p></div>
      <div class="border-t border-gray-700 pt-3"><h3 class="text-sm text-gray-400 mb-2">样式</h3>
        <div class="grid grid-cols-2 gap-2 mb-2">
          <div><label class="text-xs text-gray-400">字体大小</label><input type="number" id="font-size" value="16" class="w-full bg-darker rounded p-2 text-white"></div>
          <div><label class="text-xs text-gray-400">行间距</label><input type="number" id="line-height" value="1.6" step="0.1" class="w-full bg-darker rounded p-2 text-white"></div>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-2">
          <div><label class="text-xs text-gray-400">我的文字颜色</label><input type="color" id="user-text-color" value="#FFFFFF" class="w-full h-8"></div>
          <div><label class="text-xs text-gray-400">AI文字颜色</label><input type="color" id="ai-text-color" value="#FFFFFF" class="w-full h-8"></div>
        </div>
        <div class="grid grid-cols-2 gap-2 mb-2">
          <div><label class="text-xs text-gray-400">气泡水平边距(px)</label><input type="number" id="bubble-px" value="16" class="w-full bg-darker rounded p-2 text-white"></div>
          <div><label class="text-xs text-gray-400">气泡垂直边距(py)</label><input type="number" id="bubble-py" value="8" class="w-full bg-darker rounded p-2 text-white"></div>
        </div>
        <div class="mb-2">
          <label class="text-xs text-gray-400">屏幕边缘距离(px)</label>
          <input type="number" id="chat-h-padding" value="16" class="w-full bg-darker rounded p-2 text-white">
        </div>
      </div>
    </div>
    <button class="w-full bg-accent rounded p-3" id="save-set">保存所有设置</button>
    <p class="text-xs text-gray-500 mt-2 text-center">数据自动云端同步，多端一致</p>
  </div>

  <!-- 遮罩层 -->
  <div class="drawer-overlay" id="drawer-overlay"></div>

  <!-- 聊天全屏面板 -->
  <div class="chat-main-panel bg-dark">
    <div class="chat-header p-3 border-b border-gray-800 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div id="agent-avatar" class="w-10 h-10 bg-accent/20 flex items-center justify-center overflow-hidden rounded-lg"><span class="avatar-placeholder">AI</span></div>
        <div><span class="text-xs text-gray-500">AI</span><span id="agent-name-display" class="font-medium name-tag text-white">剧本助手 <i class="fa fa-pencil"></i></span></div>
      </div>
      <div class="flex items-center gap-2">
        <span id="user-name-display" class="hidden sm:flex font-medium name-tag text-gray-300 text-sm">我 <i class="fa fa-pencil"></i></span>
        <button class="text-gray-400 hover:text-white" id="phone-open-set"><i class="fa fa-bars"></i></button>
        <button class="text-gray-400 hover:text-white" id="reset-script">重置剧本</button>
        <button class="text-gray-400 hover:text-white" id="clear-chat">清空</button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto scrollbar-hide" id="chat-box"></div>
  </div>
</div>

<!-- 统一输入栏 -->
<div class="mobile-input-bar" id="mobile-input-area">
  <input type="text" placeholder="输入消息..." class="flex-1 bg-darker border border-gray-800 rounded-lg p-3 text-white outline-none" id="msg-input">
  <button class="bg-accent px-5 rounded-lg" id="send-btn"><i class="fa fa-paper-plane"></i></button>
</div>

<!-- 名称编辑弹窗 -->
<div id="name-edit-modal" class="name-edit-modal">
  <div class="name-edit-dialog">
    <h3 class="text-lg font-bold mb-1" id="name-edit-title"></h3>
    <p class="text-sm text-gray-400 mb-4" id="name-edit-subtitle"></p>
    <input type="text" id="name-edit-input" class="w-full bg-dark border border-gray-700 rounded-lg p-3 text-white mb-4" placeholder="输入名称">
    <div class="flex gap-2 justify-end">
      <button class="px-4 py-2 bg-gray-700 rounded-lg" id="name-edit-cancel">取消</button>
      <button class="px-4 py-2 bg-accent rounded-lg" id="name-edit-confirm">确认修改</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // Supabase 配置
    const SUPABASE_URL = 'https://vkeaimeytsymepgkizqk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_R66fP0xmbxUZTeu7kjQYjQ_FHdXlRvm';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const AI_PROXY_URL = 'https://vkeaimeytsymepgkizqk.supabase.co/functions/v1/swift-api';
    
    // 固定用户ID（所有设备共用，实现同步）
    const USER_ID = 'default_user';
    const MESSAGES_TABLE = 'chat_messages';

    // DOM 元素
    const chatBox = document.getElementById('chat-box');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const clearBtn = document.getElementById('clear-chat');
    const resetScriptBtn = document.getElementById('reset-script');
    const leftPanel = document.getElementById('left-panel');
    const phoneOpenSet = document.getElementById('phone-open-set');
    const closeDrawerBtn = document.getElementById('close-drawer-btn');
    const drawerOverlay = document.getElementById('drawer-overlay');
    const toggleSettingsBtn = document.getElementById('toggle-settings');
    const collapsibleSettings = document.getElementById('collapsible-settings');
    const agentPrompt = document.getElementById('agent-prompt');
    const agentNameSet = document.getElementById('agent-name-set');
    const userNameInput = document.getElementById('user-name');
    const saveSetBtn = document.getElementById('save-set');
    const agentAvatarUpload = document.getElementById('agent-avatar-upload');
    const agentAvatarFile = document.getElementById('agent-avatar-file');
    const agentAvatarPreview = document.getElementById('agent-avatar-preview');
    const userAvatarUpload = document.getElementById('user-avatar-upload');
    const userAvatarFile = document.getElementById('user-avatar-file');
    const userAvatarPreview = document.getElementById('user-avatar-preview');
    const fontSizeInput = document.getElementById('font-size');
    const lineHeightInput = document.getElementById('line-height');
    const userTextColor = document.getElementById('user-text-color');
    const aiTextColor = document.getElementById('ai-text-color');
    const bubblePxInput = document.getElementById('bubble-px');
    const bubblePyInput = document.getElementById('bubble-py');
    const chatHPaddingInput = document.getElementById('chat-h-padding');
    const agentNameDisplay = document.getElementById('agent-name-display');
    const userNameDisplay = document.getElementById('user-name-display');
    const agentAvatarDiv = document.getElementById('agent-avatar');
    const nameEditModal = document.getElementById('name-edit-modal');
    const nameEditTitle = document.getElementById('name-edit-title');
    const nameEditSubtitle = document.getElementById('name-edit-subtitle');
    const nameEditInput = document.getElementById('name-edit-input');
    const nameEditCancel = document.getElementById('name-edit-cancel');
    const nameEditConfirm = document.getElementById('name-edit-confirm');

    // 全局状态
    let currentAgentName = '剧本助手';
    let currentUserName = '我';
    let agentAvatarUrl = '';
    let userAvatarUrl = '';
    let currentEditTarget = null;
    let processedMessageIds = new Set(); // 用于去重，防止订阅重复插入
    let realtimeSubscription = null;

    // ---------- 辅助函数 ----------
    function updateCSSVariables() {
      document.documentElement.style.setProperty('--font-size', fontSizeInput.value + 'px');
      document.documentElement.style.setProperty('--line-height', lineHeightInput.value);
      document.documentElement.style.setProperty('--user-text-color', userTextColor.value);
      document.documentElement.style.setProperty('--ai-text-color', aiTextColor.value);
      document.documentElement.style.setProperty('--bubble-px', bubblePxInput.value + 'px');
      document.documentElement.style.setProperty('--bubble-py', bubblePyInput.value + 'px');
      document.documentElement.style.setProperty('--chat-h-padding', chatHPaddingInput.value + 'px');
    }

    function renderLatex(element) {
      try {
        renderMathInElement(element, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true}
          ],
          throwOnError: false
        });
      } catch(e) {}
    }

    function updateNameDisplays() {
      agentNameDisplay.innerHTML = `${currentAgentName} <i class="fa fa-pencil"></i>`;
      userNameDisplay.innerHTML = `${currentUserName} <i class="fa fa-pencil"></i>`;
    }

    function updateAgentAvatarDisplay() {
      agentAvatarDiv.innerHTML = agentAvatarUrl
          ? `<img src="${agentAvatarUrl}" class="avatar-img" alt="agent avatar">`
          : '<span class="avatar-placeholder">AI</span>';
    }

    function openNameEditor(target) {
      currentEditTarget = target;
      if (target === 'agent') {
        nameEditTitle.textContent = '修改智能体名称';
        nameEditSubtitle.textContent = '输入新的名称';
        nameEditInput.value = currentAgentName;
      } else {
        nameEditTitle.textContent = '修改你的名称';
        nameEditSubtitle.textContent = '输入你的称呼';
        nameEditInput.value = currentUserName;
      }
      nameEditModal.style.display = 'flex';
      nameEditInput.focus();
    }

    function closeNameEditor() {
      nameEditModal.style.display = 'none';
      currentEditTarget = null;
    }

    // ---------- 核心：渲染单条消息到 DOM ----------
    function renderMessageToDOM(role, content, messageId, animate = false) {
      // 如果该消息已经渲染过（通过 ID 判断），跳过
      if (processedMessageIds.has(messageId)) return null;
      processedMessageIds.add(messageId);

      const isUser = role === 'user';
      const avatarSrc = isUser ? userAvatarUrl : agentAvatarUrl;
      const avatarInitial = isUser ? (currentUserName || '我').charAt(0) : (currentAgentName || 'AI').charAt(0);
      const senderName = isUser ? currentUserName : currentAgentName;

      const div = document.createElement('div');
      div.className = `message-row flex mb-4 ${isUser ? 'justify-end' : 'justify-start'} items-start gap-2`;
      div.setAttribute('data-msg-id', messageId);

      const avatarHTML = avatarSrc
          ? `<img src="${avatarSrc}" class="avatar-img" alt="avatar">`
          : `<span>${avatarInitial}</span>`;

      if (isUser) {
        div.innerHTML = `
          <div class="max-w-[75%]">
            <span class="msg-name-label text-right">${senderName}</span>
            <div class="inline-block rounded-lg chat-bubble-content user-bubble">${content}</div>
          </div>
          <div class="msg-avatar">${avatarHTML}</div>
        `;
      } else {
        div.innerHTML = `
          <div class="msg-avatar">${avatarHTML}</div>
          <div class="max-w-[75%]">
            <span class="msg-name-label">${senderName}</span>
            <div class="inline-block rounded-lg chat-bubble-content ai-bubble">${content}</div>
          </div>
        `;
      }

      chatBox.appendChild(div);

      if (role === 'assistant' && animate) {
        // 对于新插入的 AI 消息，执行打字机效果（需要逐步显示）
        const bubbleDiv = div.querySelector('.chat-bubble-content');
        const fullText = content;
        bubbleDiv.innerHTML = '';
        let index = 0;
        const interval = setInterval(() => {
          if (index < fullText.length) {
            if (fullText.charAt(index) === '<') {
              const endIndex = fullText.indexOf('>', index);
              if (endIndex !== -1) {
                bubbleDiv.innerHTML += fullText.substring(index, endIndex + 1);
                index = endIndex + 1;
              } else {
                bubbleDiv.innerHTML += fullText.charAt(index);
                index++;
              }
            } else {
              bubbleDiv.innerHTML += fullText.charAt(index);
              index++;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
            renderLatex(div);
          } else {
            clearInterval(interval);
            chatBox.scrollTop = chatBox.scrollHeight;
          }
        }, 30);
      } else {
        renderLatex(div);
        chatBox.scrollTop = chatBox.scrollHeight;
      }
      return div;
    }

    // 清空聊天界面（不删数据库，仅清 DOM 并重置去重集合）
    function clearChatDOM() {
      chatBox.innerHTML = '';
      processedMessageIds.clear();
    }

    // 从数据库加载所有历史消息，并按时间顺序渲染
    async function loadMessagesFromDatabase() {
      clearChatDOM();
      const { data, error } = await supabase
          .from(MESSAGES_TABLE)
          .select('*')
          .eq('user_id', USER_ID)
          .order('created_at', { ascending: true });
      if (error) {
        console.error('加载消息失败:', error);
        // 降级：显示错误提示
        const errorDiv = document.createElement('div');
        errorDiv.className = 'text-center text-red-400 p-4';
        errorDiv.innerText = '加载聊天记录失败，请检查网络或 Supabase 权限。';
        chatBox.appendChild(errorDiv);
        return;
      }
      if (data && data.length) {
        for (const msg of data) {
          renderMessageToDOM(msg.role, msg.content, msg.id, false);
        }
      } else {
        // 没有历史记录，显示欢迎语（同时插入一条欢迎语到数据库？不需要，只显示在界面）
        const welcomeMsg = '欢迎使用剧本智能助手！点击左上角按钮设置剧本。';
        // 注意：欢迎语不持久化，只显示
        const fakeId = 'welcome-' + Date.now();
        renderMessageToDOM('assistant', welcomeMsg, fakeId, false);
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 插入一条消息到数据库（并自动触发实时同步到其他设备）
    async function insertMessageToDB(role, content) {
      const { data, error } = await supabase
          .from(MESSAGES_TABLE)
          .insert([
            { role: role, content: content, user_id: USER_ID }
          ])
          .select();
      if (error) {
        console.error('插入消息失败:', error);
        return null;
      }
      // 返回插入的记录（包含 id 和 created_at）
      return data ? data[0] : null;
    }

    // 发送消息的主要逻辑
    async function sendMessage() {
      const userText = msgInput.value.trim();
      if (!userText) return;
      msgInput.value = '';
      
      // 1. 将用户消息插入数据库（这会触发实时同步，其他设备会立刻显示）
      const userMsgRecord = await insertMessageToDB('user', userText);
      if (!userMsgRecord) {
        // 插入失败，提示错误
        const errorMsg = '消息发送失败，请检查网络。';
        const fakeId = 'err-' + Date.now();
        renderMessageToDOM('user', errorMsg, fakeId, false);
        return;
      }
      // 本地立即渲染（避免等待实时回调，更流畅）
      renderMessageToDOM('user', userText, userMsgRecord.id, false);
      
      // 2. 调用 AI 获取回复
      const reply = await getAIResponse(userText);
      
      // 3. 将 AI 回复插入数据库（同样会触发同步）
      const aiMsgRecord = await insertMessageToDB('assistant', reply);
      if (aiMsgRecord) {
        // 本地渲染（带动画）
        renderMessageToDOM('assistant', reply, aiMsgRecord.id, true);
      } else {
        // 如果插入失败，至少显示在本地（但不会同步到其他设备）
        const fakeId = 'ai-fail-' + Date.now();
        renderMessageToDOM('assistant', reply, fakeId, true);
      }
    }

    // 调用 AI 代理
    async function getAIResponse(userMessage) {
      const script = agentPrompt.value.trim();
      if (!script) return "请先在左侧设置中填写剧本内容。";
      
      const systemPrompt = `
你是一个严格按照剧本回答问题的助手。
⚠️ 绝对规则：
1. 所有回答只能来自下面的剧本内容，绝对不能编造任何剧本里没有的信息。
2. 如果用户的问题剧本里没有答案，只说"这个我暂时不知道哦"。
3. 剧本里的[red:文字]、[b:文字]、[br]这些格式标记必须原封不动保留。
4. 不要加任何剧本以外的解释或客套话。

--- 剧本开始 ---
${script}
--- 剧本结束 ---
`;
      try {
        const response = await fetch(AI_PROXY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: userMessage }
            ],
          }),
        });
        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error?.message || '请求失败');
        }
        const data = await response.json();
        let content = data.choices[0].message.content.trim();
        // 解析剧本中的特殊格式
        content = content.replace(/\[red:(.*?)\]/g, '<span style="color: #ff4444">$1</span>');
        content = content.replace(/\[b:(.*?)\]/g, '<strong>$1</strong>');
        content = content.replace(/\[br\]/g, '<br>');
        return content;
      } catch (error) {
        return `⚠️ AI 模式出错：${error.message}<br>请检查 Supabase Edge Function 是否部署正常。`;
      }
    }

    // 清空聊天（删除数据库中的所有消息）
    async function clearChat() {
      const { error } = await supabase
          .from(MESSAGES_TABLE)
          .delete()
          .eq('user_id', USER_ID);
      if (error) {
        console.error('清空聊天失败:', error);
        alert('清空失败，请重试。');
        return;
      }
      // 清空 DOM 和去重集合
      clearChatDOM();
      // 重新加载（会显示空状态，并显示欢迎语）
      await loadMessagesFromDatabase();
    }

    // 重置剧本（仅清空聊天，不清除设置中的剧本内容）
    async function resetScript() {
      await clearChat();
    }

    // ---------- 实时订阅：监听新消息，并自动渲染 ----------
    function setupRealtimeSubscription() {
      if (realtimeSubscription) {
        realtimeSubscription.unsubscribe();
      }
      realtimeSubscription = supabase
          .channel('chat_messages_channel')
          .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: MESSAGES_TABLE,
            filter: `user_id=eq.${USER_ID}`
          }, (payload) => {
            const newMsg = payload.new;
            // 避免重复渲染（防止本地插入后订阅又触发一次）
            if (!processedMessageIds.has(newMsg.id)) {
              // 如果新消息是当前设备刚发出的，可能已经在 sendMessage 里渲染过了，但 processedMessageIds 已添加，所以不会重复
              // 对于其他设备发来的消息，这里会触发渲染，且不需要动画（或者可以动画？为了体验，我们可以让远端来的 AI 消息也有动画，但可能打断阅读。简单起见，不做动画）
              renderMessageToDOM(newMsg.role, newMsg.content, newMsg.id, false);
              chatBox.scrollTop = chatBox.scrollHeight;
            }
          })
          .subscribe();
    }

    // ---------- 设置相关（云端同步，与原逻辑一致）----------
    const SETTINGS_TABLE = 'user_settings';
    const SETTINGS_ID = 'default';
    
    async function saveSettingsToCloud() {
      currentAgentName = agentNameSet.value || currentAgentName;
      currentUserName = userNameInput.value || currentUserName;
      updateNameDisplays();
      updateCSSVariables();

      const settings = {
        id: SETTINGS_ID,
        agent_prompt: agentPrompt.value,
        agent_name: currentAgentName,
        user_name: currentUserName,
        agent_avatar_url: agentAvatarUrl,
        user_avatar_url: userAvatarUrl,
        font_size: parseInt(fontSizeInput.value) || 16,
        line_height: parseFloat(lineHeightInput.value) || 1.6,
        user_text_color: userTextColor.value,
        ai_text_color: aiTextColor.value,
        bubble_px: parseInt(bubblePxInput.value) || 16,
        bubble_py: parseInt(bubblePyInput.value) || 8,
        chat_h_padding: parseInt(chatHPaddingInput.value) || 16,
        updated_at: new Date().toISOString()
      };
      localStorage.setItem('chat-settings', JSON.stringify(settings));
      try {
        await supabase.from(SETTINGS_TABLE).upsert(settings, { onConflict: 'id' });
        return true;
      } catch (err) {
        console.warn('云端同步失败', err);
        return false;
      }
    }

    async function loadSettingsFromCloud() {
      try {
        const { data, error } = await supabase
            .from(SETTINGS_TABLE)
            .select('*')
            .eq('id', SETTINGS_ID)
            .single();
        if (error) throw error;
        if (data) {
          if (data.agent_prompt) agentPrompt.value = data.agent_prompt;
          if (data.agent_name) { currentAgentName = data.agent_name; agentNameSet.value = data.agent_name; }
          if (data.user_name) { currentUserName = data.user_name; userNameInput.value = data.user_name; }
          if (data.agent_avatar_url) { agentAvatarUrl = data.agent_avatar_url; updateAgentAvatarDisplay(); }
          if (data.user_avatar_url) userAvatarUrl = data.user_avatar_url;
          if (data.font_size) fontSizeInput.value = data.font_size;
          if (data.line_height) lineHeightInput.value = data.line_height;
          if (data.user_text_color) userTextColor.value = data.user_text_color;
          if (data.ai_text_color) aiTextColor.value = data.ai_text_color;
          if (data.bubble_px) bubblePxInput.value = data.bubble_px;
          if (data.bubble_py) bubblePyInput.value = data.bubble_py;
          if (data.chat_h_padding) chatHPaddingInput.value = data.chat_h_padding;
          updateNameDisplays();
          updateCSSVariables();
        }
      } catch (err) {
        // 降级到本地存储
        const saved = JSON.parse(localStorage.getItem('chat-settings') || '{}');
        if (saved.agentPrompt) agentPrompt.value = saved.agentPrompt;
        if (saved.agentName) { currentAgentName = saved.agentName; agentNameSet.value = saved.agentName; }
        if (saved.userName) { currentUserName = saved.userName; userNameInput.value = saved.userName; }
        if (saved.agentAvatarUrl) { agentAvatarUrl = saved.agentAvatarUrl; updateAgentAvatarDisplay(); }
        if (saved.userAvatarUrl) userAvatarUrl = saved.userAvatarUrl;
        if (saved.fontSize) fontSizeInput.value = saved.fontSize;
        if (saved.lineHeight) lineHeightInput.value = saved.lineHeight;
        if (saved.userTextColor) userTextColor.value = saved.userTextColor;
        if (saved.aiTextColor) aiTextColor.value = saved.aiTextColor;
        if (saved.bubblePx) bubblePxInput.value = saved.bubblePx;
        if (saved.bubblePy) bubblePyInput.value = saved.bubblePy;
        if (saved.chatHPadding) chatHPaddingInput.value = saved.chatHPadding;
        updateNameDisplays();
        updateCSSVariables();
      }
    }

    // 头像上传处理（保持原有）
    agentAvatarUpload.addEventListener('click', () => agentAvatarFile.click());
    agentAvatarFile.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = ev => {
          agentAvatarUrl = ev.target.result;
          agentAvatarPreview.innerHTML = `<img src="${agentAvatarUrl}" class="avatar-img">`;
          updateAgentAvatarDisplay();
        };
        reader.readAsDataURL(file);
      }
    });
    userAvatarUpload.addEventListener('click', () => userAvatarFile.click());
    userAvatarFile.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = ev => {
          userAvatarUrl = ev.target.result;
          userAvatarPreview.innerHTML = `<img src="${userAvatarUrl}" class="avatar-img">`;
        };
        reader.readAsDataURL(file);
      }
    });

    // 事件绑定
    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
    clearBtn.addEventListener('click', clearChat);
    resetScriptBtn.addEventListener('click', resetScript);
    saveSetBtn.addEventListener('click', async () => {
      await saveSettingsToCloud();
      alert('设置已保存并同步云端');
    });
    agentNameDisplay.addEventListener('click', () => openNameEditor('agent'));
    userNameDisplay.addEventListener('click', () => openNameEditor('user'));
    nameEditCancel.addEventListener('click', closeNameEditor);
    nameEditConfirm.addEventListener('click', async () => {
      const newName = nameEditInput.value.trim();
      if (!newName) return;
      if (currentEditTarget === 'agent') {
        currentAgentName = newName;
        agentNameSet.value = newName;
      } else {
        currentUserName = newName;
        userNameInput.value = newName;
      }
      updateNameDisplays();
      closeNameEditor();
      await saveSettingsToCloud();
    });
    [fontSizeInput, lineHeightInput, userTextColor, aiTextColor, bubblePxInput, bubblePyInput, chatHPaddingInput].forEach(el => {
      el.addEventListener('input', updateCSSVariables);
    });
    phoneOpenSet.addEventListener('click', () => {
      leftPanel.classList.add('expand');
      drawerOverlay.classList.add('show');
    });
    closeDrawerBtn.addEventListener('click', () => {
      leftPanel.classList.remove('expand');
      drawerOverlay.classList.remove('show');
    });
    drawerOverlay.addEventListener('click', () => {
      leftPanel.classList.remove('expand');
      drawerOverlay.classList.remove('show');
    });
    toggleSettingsBtn.addEventListener('click', () => {
      collapsibleSettings.style.display = collapsibleSettings.style.display === 'block' ? 'none' : 'block';
    });

    // ---------- 初始化 ----------
    async function init() {
      updateCSSVariables();
      await loadSettingsFromCloud();
      await loadMessagesFromDatabase();
      setupRealtimeSubscription();
    }
    init();

    // Service Worker 注册（可选）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw-chat.js').catch(console.log);
      });
    }
  })();
</script>
</body>
</html>

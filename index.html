<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剧本智能助手</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0a0a0a',
                        panel: '#121212',
                        border: '#1f1f1f',
                        text: '#e5e5e5',
                        muted: '#737373',
                        accent: '#3b82f6'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .scrollbar-thin {
                scrollbar-width: thin;
                scrollbar-color: #262626 transparent;
            }
            .scrollbar-thin::-webkit-scrollbar {
                width: 6px;
            }
            .scrollbar-thin::-webkit-scrollbar-thumb {
                background-color: #262626;
                border-radius: 3px;
            }
            .no-outline:focus {
                outline: none;
            }
        }
    </style>
</head>
<body class="bg-bg text-text h-screen overflow-hidden">
    <!-- 顶部状态栏 -->
    <header class="h-12 border-b border-border flex items-center px-4 justify-between">
        <div class="font-medium">剧本智能助手</div>
        <div id="connection-status" class="text-xs text-muted flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-muted" id="status-dot"></span>
            <span id="status-text">连接中...</span>
        </div>
    </header>

    <!-- 三栏主布局 -->
    <main class="h-[calc(100vh-48px)] flex">
        <!-- 左侧：剧本列表 -->
        <aside class="w-64 border-r border-border bg-panel flex flex-col">
            <div class="p-3 border-b border-border">
                <button id="new-btn" class="w-full py-2 text-sm border border-border rounded hover:bg-border/50 transition">
                    + 新建剧本
                </button>
            </div>
            <div id="script-list" class="flex-1 overflow-y-auto scrollbar-thin p-2 space-y-1">
                <!-- 列表由JS动态渲染 -->
            </div>
        </aside>

        <!-- 中间：编辑区 -->
        <section class="flex-1 flex flex-col">
            <input 
                id="script-title" 
                class="bg-transparent px-6 py-4 text-xl font-medium border-b border-border no-outline placeholder:text-muted"
                placeholder="无标题剧本"
            >
            <textarea 
                id="script-content" 
                class="flex-1 bg-transparent p-6 no-outline resize-none scrollbar-thin leading-relaxed"
                placeholder="开始创作你的剧本..."
            ></textarea>
        </section>

        <!-- 右侧：助手面板 -->
        <aside class="w-80 border-l border-border bg-panel flex flex-col">
            <div class="p-3 border-b border-border text-sm font-medium">AI 助手</div>
            <div class="flex-1 p-4 text-muted text-sm leading-relaxed">
                实时同步已开启<br>
                编辑内容将自动保存并同步到所有设备
            </div>
        </aside>
    </main>

    <script>
        // ===================== 配置项（请替换为你自己的信息） =====================
        const SUPABASE_URL = '你的项目URL';
        const SUPABASE_ANON_KEY = '你的anon公钥';
        const TABLE_NAME = 'scripts';
        const AUTO_SAVE_DELAY = 800; // 自动保存防抖间隔(毫秒)

        // 初始化Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            realtime: {
                params: { eventsPerSecond: 10 }
            }
        });

        // 全局状态
        let currentScriptId = null;
        let saveTimeout = null;
        let realtimeChannel = null;
        window.scriptCache = [];

        // DOM元素
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const scriptListEl = document.getElementById('script-list');
        const titleInput = document.getElementById('script-title');
        const contentInput = document.getElementById('script-content');
        const newBtn = document.getElementById('new-btn');

        // ===================== 连接状态展示 =====================
        function setConnectionStatus(status) {
            switch(status) {
                case 'connected':
                    statusDot.className = 'w-2 h-2 rounded-full bg-green-500';
                    statusText.textContent = '已实时同步';
                    break;
                case 'disconnected':
                    statusDot.className = 'w-2 h-2 rounded-full bg-red-500';
                    statusText.textContent = '连接断开';
                    break;
                case 'connecting':
                    statusDot.className = 'w-2 h-2 rounded-full bg-yellow-500';
                    statusText.textContent = '同步中...';
                    break;
            }
        }

        // ===================== 界面渲染 =====================
        function renderScriptList() {
            scriptListEl.innerHTML = '';
            if (!window.scriptCache.length) {
                scriptListEl.innerHTML = '<div class="text-xs text-muted p-2 text-center">暂无剧本</div>';
                return;
            }

            window.scriptCache.forEach(script => {
                const item = document.createElement('div');
                item.className = `px-3 py-2 text-sm rounded cursor-pointer transition ${
                    script.id === currentScriptId ? 'bg-border text-white' : 'hover:bg-border/50'
                }`;
                item.textContent = script.title || '无标题剧本';
                item.addEventListener('click', () => loadScript(script));
                scriptListEl.appendChild(item);
            });
        }

        function loadScript(script) {
            currentScriptId = script.id;
            titleInput.value = script.title || '';
            contentInput.value = script.content || '';
            renderScriptList();
        }

        // ===================== 数据库操作 =====================
        async function fetchScripts() {
            setConnectionStatus('connecting');
            const { data, error } = await supabase
                .from(TABLE_NAME)
                .select('id, title, created_at')
                .order('updated_at', { ascending: false });

            if (error) {
                console.error('加载失败:', error);
                setConnectionStatus('disconnected');
                return;
            }

            window.scriptCache = data;
            renderScriptList();
            setConnectionStatus('connected');

            if (data.length && !currentScriptId) loadScript(data[0]);
        }

        async function createNewScript() {
            const { data, error } = await supabase
                .from(TABLE_NAME)
                .insert([{ title: '新剧本', content: '' }])
                .select()
                .single();

            if (error) return console.error('新建失败:', error);
            loadScript(data);
        }

        async function saveCurrentScript() {
            if (!currentScriptId) return;
            await supabase
                .from(TABLE_NAME)
                .update({
                    title: titleInput.value,
                    content: contentInput.value,
                    updated_at: new Date().toISOString()
                })
                .eq('id', currentScriptId);
        }

        // 防抖自动保存
        function debounceSave() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(saveCurrentScript, AUTO_SAVE_DELAY);
        }

        // ===================== 核心：实时订阅 =====================
        function initRealtime() {
            if (realtimeChannel) supabase.removeChannel(realtimeChannel);

            realtimeChannel = supabase
                .channel('public:scripts')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: TABLE_NAME }, 
                    (payload) => handleRealtimeEvent(payload)
                )
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') setConnectionStatus('connected');
                    if (status === 'CLOSED' || status === 'CHANNEL_ERROR') setConnectionStatus('disconnected');
                });
        }

        function handleRealtimeEvent(payload) {
            const { eventType, new: newRecord, old: oldRecord } = payload;

            switch(eventType) {
                case 'INSERT':
                    window.scriptCache.unshift({
                        id: newRecord.id,
                        title: newRecord.title,
                        created_at: newRecord.created_at
                    });
                    renderScriptList();
                    break;

                case 'UPDATE':
                    const idx = window.scriptCache.findIndex(s => s.id === newRecord.id);
                    if (idx !== -1) window.scriptCache[idx].title = newRecord.title;
                    renderScriptList();

                    // 防输入冲突：正在编辑时不覆盖输入框
                    if (currentScriptId === newRecord.id 
                        && document.activeElement !== contentInput 
                        && document.activeElement !== titleInput) {
                        titleInput.value = newRecord.title || '';
                        contentInput.value = newRecord.content || '';
                    }
                    break;

                case 'DELETE':
                    window.scriptCache = window.scriptCache.filter(s => s.id !== oldRecord.id);
                    renderScriptList();
                    if (currentScriptId === oldRecord.id) {
                        currentScriptId = null;
                        titleInput.value = '';
                        contentInput.value = '';
                    }
                    break;
            }
        }

        // ===================== 事件绑定与初始化 =====================
        newBtn.addEventListener('click', createNewScript);
        titleInput.addEventListener('input', debounceSave);
        contentInput.addEventListener('input', debounceSave);

        async function init() {
            setConnectionStatus('connecting');
            await fetchScripts();
            initRealtime();
        }

        init();
    </script>
</body>
</html>
